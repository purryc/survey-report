<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>Report not found · Survey Report</title>
    <script>
      function normalizeKnownReportRoute() {
        const reportBase = "/survey-report/reports/agent-pc-design-options/";
        const directSlide = location.pathname.startsWith(reportBase)
          ? location.pathname.slice(reportBase.length).replace(/\/$/, "")
          : "";
        if (/^\d+$/.test(directSlide)) {
          location.replace(`${reportBase}#/${directSlide}`);
          return;
        }
        const badPrefix = "#/survey-report/reports/agent-pc-design-options/";
        if (location.hash.startsWith(badPrefix)) {
          location.replace(`${reportBase}#/${location.hash.slice(badPrefix.length)}`);
        }
      }
      normalizeKnownReportRoute();
      window.addEventListener("hashchange", normalizeKnownReportRoute);
    </script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #ffffff;
        color: #111827;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      main {
        width: min(680px, calc(100vw - 40px));
      }
      h1 {
        font-size: clamp(36px, 8vw, 92px);
        line-height: 1;
        margin: 0 0 18px;
        font-weight: 300;
      }
      p {
        color: #5b6472;
        line-height: 1.65;
      }
      a {
        display: inline-flex;
        margin-top: 12px;
        min-height: 40px;
        align-items: center;
        border-radius: 6px;
        padding: 9px 14px;
        background: #111827;
        color: #ffffff;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>404</h1>
      <p>
        这个报告地址不存在，或旧的 Slidev 页码链接已经失效。请从调研报告总目录重新进入。
        <br />
        This report URL does not exist, or an old Slidev page link is no longer valid. Start from the report index.
      </p>
      <a href="/survey-report/">回到总目录 / Go to index</a>
    </main>
  </body>
</html>
