</g>
 G3 磁吸分体 
<g transform="translate(640,0)">
<g stroke="#23211c" stroke-width="2" transform="rotate(-3 160 80)"><rect height="80" rx="5" width="176" x="72" y="44"></rect><rect height="64" stroke-width="1.2" width="158" x="81" y="52"></rect></g>
