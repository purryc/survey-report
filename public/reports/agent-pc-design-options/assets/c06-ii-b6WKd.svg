<svg xmlns="http://www.w3.org/2000/svg" viewBox="640 280 320 280" fill="none" stroke-linecap="round" stroke-linejoin="round" font-family="PingFang SC, Microsoft YaHei, sans-serif">
 G1 升降潜望 
<g>
<rect height="60" rx="7" stroke="#23211c" stroke-width="2" width="200" x="60" y="170"></rect>
<rect height="9" rx="3" stroke="#23211c" stroke-width="1.3" width="132" x="94" y="164"></rect>
