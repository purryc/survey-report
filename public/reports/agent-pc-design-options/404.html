<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent PC Design Options</title>
<script>
  function normalizeAgentPcDeckRoute() {
    const reportBase = "/survey-report/reports/agent-pc-design-options/";
    const directSlide = location.pathname.startsWith(reportBase)
      ? location.pathname.slice(reportBase.length).replace(/\/$/, "")
      : "";
    if (/^\d+$/.test(directSlide)) {
      location.replace(`${reportBase}#/${directSlide}`);
      return;
    }
    const badPrefix = "#/survey-report/reports/agent-pc-design-options/";
    if (location.hash.startsWith(badPrefix)) {
      location.replace(`${reportBase}#/${location.hash.slice(badPrefix.length)}`);
      return;
    }
    location.replace(reportBase);
  }
  normalizeAgentPcDeckRoute();
  window.addEventListener("hashchange", normalizeAgentPcDeckRoute);
</script>
</head>
<body></body>
</html>
